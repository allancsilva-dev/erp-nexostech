services:
  redis:
    image: redis:7-alpine
    container_name: nexos-redis
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "redis",
        "--maxmemory",
        "256mb",
        "--maxmemory-policy",
        "allkeys-lru"
      ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexos_internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexos-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    ports:
      - "3004:3001"
    networks:
      - nexos_internal
      - nginx-proxy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api-erp.zonadev.tech/api/v1
        NEXT_PUBLIC_AUTH_URL: https://auth.zonadev.tech
        NEXT_PUBLIC_APP_AUDIENCE: erp.zonadev.tech
        NEXT_PUBLIC_APP_URL: https://erp.zonadev.tech
    container_name: nexos-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003', (r) => r.statusCode < 500 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    ports:
      - "3003:3003"
    networks:
      - nexos_internal
      - nginx-proxy

networks:
  nexos_internal:
    driver: bridge
    internal: true
  nginx-proxy:
    external: true

volumes:
  redis_data:

